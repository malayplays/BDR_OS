version: "3.9"

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/app/data
      - ./backend:/app
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:////app/data/bdr_os.db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  sqlite_data:
