# Agent configuration — model selection and defaults
# ANTHROPIC_API_KEY must be set in env.

defaults:
  model: claude-sonnet-4-20250514
  max_tokens: 2048
  temperature: 0.3

agents:
  research_brief:
    model: claude-sonnet-4-20250514
    max_tokens: 1024
    temperature: 0.2
  crm_scribe:
    model: claude-sonnet-4-20250514
    max_tokens: 2048
    temperature: 0.2
  copy:
    model: claude-sonnet-4-20250514
    max_tokens: 2048
    temperature: 0.4
  inbox_triage:
    model: claude-sonnet-4-20250514
    max_tokens: 512
    temperature: 0.1
  book_response:
    model: claude-sonnet-4-20250514
    max_tokens: 512
    temperature: 0.3
  reporting:
    model: claude-sonnet-4-20250514
    max_tokens: 2048
    temperature: 0.2
